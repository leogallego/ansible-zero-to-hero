---
# Module 2 - Manage a system service on localhost
# This playbook demonstrates the ansible.builtin.service module.
#
# Note: This playbook requires systemd to be running and may not
# work inside containers without a full init system. It is best
# tested on a virtual machine or bare-metal system.

- name: Manage the chronyd service
  hosts: localhost
  connection: local
  become: true

  tasks:
    - name: Ensure chronyd is installed
      ansible.builtin.package:
        name: chrony
        state: present

    - name: Ensure chronyd is started and enabled
      ansible.builtin.service:
        name: chronyd
        state: started
        enabled: true
