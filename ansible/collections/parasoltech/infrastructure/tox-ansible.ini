# tox-ansible.ini — Configuration for the tox-ansible plugin
#
# The tox-ansible plugin auto-discovers test environments by
# scanning the collection structure. This file only needs a
# skip list to exclude Python and Ansible versions that are
# not available in the development environment.
#
# Usage:
#   tox --ansible -c tox-ansible.ini list       # Show environments
#   tox --ansible -c tox-ansible.ini             # Run all tests
#   tox --ansible -c tox-ansible.ini -e sanity-* # Run sanity only

[ansible]
skip =
    py3.7
    py3.8
    py3.9
    py3.10
    py3.11
    2.9
    2.10
    2.11
    2.12
    2.13
    2.14
    2.15
    2.16
    2.17
    devel
    milestone
