---
# Parasol Tech inventory
# Hosts are organized by environment, with functional groups
# spanning across environments.
#
# In a real deployment, replace these hostnames with actual
# FQDNs or IP addresses. For course exercises, use the
# check-inventory.yml playbook which targets localhost.

all:
  hosts:
    localhost:
      ansible_connection: local

  children:
    # --- Environment groups ---
    dev:
      children:
        dev_webservers:
          hosts:
            web01.dev.parasol.example:
            web02.dev.parasol.example:
        dev_dbservers:
          hosts:
            db01.dev.parasol.example:

    staging:
      children:
        staging_webservers:
          hosts:
            web01.staging.parasol.example:
            web02.staging.parasol.example:
        staging_dbservers:
          hosts:
            db01.staging.parasol.example:

    production:
      children:
        prod_webservers:
          hosts:
            web01.prod.parasol.example:
            web02.prod.parasol.example:
            web03.prod.parasol.example:
        prod_dbservers:
          hosts:
            db01.prod.parasol.example:
            db02.prod.parasol.example:

    # --- Functional groups (span all environments) ---
    webservers:
      children:
        dev_webservers:
        staging_webservers:
        prod_webservers:

    dbservers:
      children:
        dev_dbservers:
        staging_dbservers:
        prod_dbservers:
